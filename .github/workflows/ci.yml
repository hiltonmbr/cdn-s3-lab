name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  notebook-check:
    name: Notebooks are output-stripped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv --quiet
      - name: Check notebooks are stripped
        run: make check

  lint:
    name: Lint Python source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv --quiet
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Run ruff
        run: uv run ruff check --fix scripts/ notebooks/
